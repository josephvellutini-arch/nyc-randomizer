<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NYC Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>NYC Randomizer</h1>
    <p class="subtitle">Pick a borough, pick some categories, get a randomized itinerary.</p>
  </header>

  <main>
    <section class="controls">
      <fieldset id="borough-group">
        <legend>Boroughs</legend>
        <label><input type="checkbox" id="all-nyc" checked /> All NYC</label>
        <label><input type="checkbox" class="borough-check" value="Manhattan" checked /> Manhattan</label>
        <label><input type="checkbox" class="borough-check" value="Brooklyn" checked /> Brooklyn</label>
        <label><input type="checkbox" class="borough-check" value="Queens" checked /> Queens</label>
        <label><input type="checkbox" class="borough-check" value="Bronx" checked /> Bronx</label>
        <label><input type="checkbox" class="borough-check" value="StatenIsland" checked /> Staten Island</label>
      </fieldset>

      <fieldset id="category-group">
        <legend>Categories</legend>
        <label><input type="checkbox" class="category-check" value="restaurant" checked /> Restaurants</label>
        <label><input type="checkbox" class="category-check" value="cafe" checked /> Cafes</label>
        <label><input type="checkbox" class="category-check" value="park" checked /> Parks</label>
        <label><input type="checkbox" class="category-check" value="landmark" checked /> Landmarks</label>
        <label><input type="checkbox" class="category-check" value="museum" checked /> Museums &amp; Cultural Orgs</label>
        <label><input type="checkbox" class="category-check" value="public_art" checked /> Public Art</label>
        <label><input type="checkbox" class="category-check" value="market" checked /> Markets</label>
      </fieldset>

      <fieldset id="mode-group">
        <legend>Mode</legend>
        <label>
          <input type="radio" name="mode" value="topn" checked />
          Top
          <input type="number" id="top-n" value="5" min="1" max="50" />
          by score
        </label>
        <label>
          <input type="radio" name="mode" value="full" />
          Full randomize
        </label>
      </fieldset>

      <button id="generate">Generate Itinerary</button>
      <p id="status" role="status"></p>
    </section>

    <section id="results"></section>
  </main>

  <footer>
    <p>
      Venue data: <a href="https://opendata.cityofnewyork.us/" target="_blank" rel="noopener">NYC Open Data</a>
      and <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors (ODbL).
      Scores are a proprietary heuristic — not sourced from Yelp/Google/TripAdvisor/Apple.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
